<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Light</title>
    <script src="https://unpkg.com/mqtt@5.0.0/dist/mqtt.min.js"></script>
    <style>
        body {
            background: #1e1e2f;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            margin-top: 100px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 80px;
            height: 40px;
        }
        .switch input {
            display: none;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            background-color: #ccc;
            border-radius: 40px;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: 0.4s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 30px;
            width: 30px;
            left: 5px;
            bottom: 5px;
            background-color: white;
            border-radius: 50%;
            transition: 0.4s;
        }
        input:checked + .slider {
            background-color: #00c853;
        }
        input:checked + .slider:before {
            transform: translateX(40px);
        }
        .status {
            margin-top: 20px;
            font-size: 20px;
        }
        .conn-status {
            margin-top: 10px;
            font-size: 14px;
            padding: 5px;
            border-radius: 5px;
        }
        .connected {
            color: #00c853;
        }
        .disconnected {
            color: #ff4444;
        }
    </style>

    <!-- 1. ICONS FOR IOS WEB CLIP (Home Screen) -->
    <!-- 180x180 is the standard size for all modern iPhones -->
    <link rel="apple-touch-icon" href="/icon-180.png">
    
    <!-- For extra specificity (optional but good practice) -->
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png">
    
    <!-- 2. PWA META TAGS FOR STANDALONE MODE -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Smart Home">

    <!-- 3. YOUR EXISTING MANIFEST (Still needed for Android/Chrome) -->
    <link rel="manifest" href="/manifest.json">
    
</head>
<body>
<div class="container">
    <h1>💡 Smart Light</h1>
    <div class="conn-status" id="connStatus">Connecting to MQTT...</div>
    
    <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
    </label>
    
    <div class="status" id="status">Status: Unknown</div>
</div>

<script>
    // Your HiveMQ credentials
    const BROKER = "wss://02265bce42164317af0133828c96f3db.s1.eu.hivemq.cloud:8884/mqtt";
    const USERNAME = "ibrmnas";
    const PASSWORD = "gecB7C!3Nq@fQ7n";
    
    let client = null;
    
    function connect() {
        const options = {
            username: USERNAME,
            password: PASSWORD,
            clean: true,
            reconnectPeriod: 5000,
            connectTimeout: 30000
        };
        
        client = mqtt.connect(BROKER, options);
        
        client.on('connect', () => {
            document.getElementById('connStatus').innerHTML = '✅ Connected to HiveMQ Cloud';
            document.getElementById('connStatus').className = 'conn-status connected';
            document.getElementById('toggle').disabled = false;
            
            // Subscribe to receive status updates
            client.subscribe('room/led/status');
        });
        
        client.on('message', (topic, message) => {
            if (topic === 'room/led/status') {
                const state = message.toString();
                document.getElementById('status').innerHTML = `Status: ${state}`;
                document.getElementById('toggle').checked = (state === 'ON');
            }
        });
        
        client.on('error', (err) => {
            console.error('Connection error:', err);
            document.getElementById('connStatus').innerHTML = '❌ Connection failed';
            document.getElementById('connStatus').className = 'conn-status disconnected';
        });
        
        client.on('close', () => {
            document.getElementById('connStatus').innerHTML = '🔄 Disconnected, reconnecting...';
            document.getElementById('connStatus').className = 'conn-status disconnected';
            document.getElementById('toggle').disabled = true;
        });
    }
    
    // Send command when toggled
    document.getElementById('toggle').addEventListener('change', (e) => {
        if (!client || !client.connected) {
            alert('Not connected to MQTT broker');
            e.target.checked = !e.target.checked;
            return;
        }
        
        const state = e.target.checked ? 'ON' : 'OFF';
        client.publish('room/led', state);
        document.getElementById('status').innerHTML = `Status: Sending ${state}...`;
    });
    
    // Start connection
    connect();
</script>
</body>
</html>
